global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "monitoring-server-node"
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: "app-server-node"
    static_configs:
      - targets: ["APP_PRIVATE_IP:9100"]
